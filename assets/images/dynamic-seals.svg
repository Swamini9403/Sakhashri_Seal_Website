<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sealGradient">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Geometric Pattern -->
  <g opacity="0.1" stroke="white" fill="none" stroke-width="2">
    <circle cx="400" cy="300" r="50"/>
    <circle cx="400" cy="300" r="80"/>
    <circle cx="400" cy="300" r="110"/>
    <circle cx="400" cy="300" r="140"/>
    <circle cx="400" cy="300" r="170"/>
    <circle cx="400" cy="300" r="200"/>
  </g>
  
  <!-- Seal 1 -->
  <g>
    <circle cx="200" cy="200" r="60" fill="url(#sealGradient)" opacity="0.8"/>
    <circle cx="200" cy="200" r="36" fill="rgba(0,0,0,0.3)"/>
    <circle cx="200" cy="200" r="18" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Seal 2 -->
  <g>
    <circle cx="600" cy="200" r="60" fill="url(#sealGradient)" opacity="0.8"/>
    <circle cx="600" cy="200" r="36" fill="rgba(0,0,0,0.3)"/>
    <circle cx="600" cy="200" r="18" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Seal 3 (Center Large) -->
  <g>
    <circle cx="400" cy="380" r="80" fill="url(#sealGradient)" opacity="0.9"/>
    <circle cx="400" cy="380" r="48" fill="rgba(0,0,0,0.3)"/>
    <circle cx="400" cy="380" r="24" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
    DYNAMIC SEAL KITS
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">
    Precision Engineered for Performance
  </text>
  
  <!-- Icons -->
  <text x="150" y="450" font-size="40" text-anchor="middle">⚙️</text>
  <text x="650" y="450" font-size="40" text-anchor="middle">🔧</text>
  <text x="400" y="260" font-size="40" text-anchor="middle">⚡</text>
  
  <!-- ISO Badge -->
  <g>
    <circle cx="700" cy="100" r="50" fill="rgba(255,215,0,0.9)" stroke="white" stroke-width="3"/>
    <text x="700" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#001f4d" text-anchor="middle">ISO</text>
    <text x="700" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#001f4d" text-anchor="middle">CERTIFIED</text>
  </g>
  
  <!-- Decorative Elements -->
  <line x1="100" y1="300" x2="300" y2="300" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="500" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>
